spring.application.name=Booking-BreakoutRoom

# Server
server.port=${SERVER_PORT:8080}

# PostgreSQL Database
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://db:5432/breakout_room}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Swagger
springdoc.api-docs.enabled=true 
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
spring.flyway.baseline-on-migrate=true

# JWT
jwt.secret=${JWT_SECRET:dev-secret-key-for-development-only}
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# App URL
app.base-url=${APP_BASE_URL:http://localhost:${server.port}}